replicaCount: 1

image:
  repository: ghcr.io/weodf/springboot-cicd-demo
  pullPolicy: IfNotPresent
  tag: main

imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 8080

containerPort: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: springboot-cicd-demo.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources: {}

podAnnotations: {}

env: []

livenessProbe:
  path: /actuator/health
  initialDelaySeconds: 20
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 6

readinessProbe:
  path: /actuator/health
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 6
