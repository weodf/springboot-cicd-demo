name: Deploy To K8s

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options:
          - dev
          - sit
          - uat
          - prod
      image_tag:
        description: Image tag to deploy
        required: true
        default: main
      change_number:
        description: Change number for production deployments
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: deploy-k8s-${{ github.event.inputs.environment }}
  cancel-in-progress: true

jobs:
  deploy:
    environment: ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    env:
      VM_HOST: ${{ secrets.VM_HOST }}
      VM_USER: ${{ secrets.VM_USER }}
      VM_SSH_KEY: ${{ secrets.VM_SSH_KEY }}
      VM_SSH_PASSPHRASE: ${{ secrets.VM_SSH_PASSPHRASE }}
      VM_PORT: ${{ secrets.VM_PORT }}
      GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate deployment request
        env:
          TARGET_ENV: ${{ github.event.inputs.environment }}
          IMAGE_TAG: ${{ github.event.inputs.image_tag }}
          CHANGE_NUMBER: ${{ github.event.inputs.change_number }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -eu

          test -n "${TARGET_ENV}" || { echo "environment is required"; exit 1; }
          test -n "${IMAGE_TAG}" || { echo "image_tag is required"; exit 1; }

          case "${TARGET_ENV}" in
            dev)
              case "${REF_NAME}" in
                feature/*|main) ;;
                *)
                  echo "dev deployments are only allowed from main or feature/*"
                  exit 1
                  ;;
              esac
              ;;
            sit|uat)
              case "${REF_NAME}" in
                main|master|release/*) ;;
                *)
                  echo "${TARGET_ENV} deployments are only allowed from main, master, or release/*"
                  exit 1
                  ;;
              esac

              case "${IMAGE_TAG}" in
                main|"")
                  echo "${TARGET_ENV} deployments must use a fixed image tag, not main"
                  exit 1
                  ;;
              esac
              ;;
            prod)
              case "${REF_NAME}" in
                release/*) ;;
                *)
                  echo "prod deployments are only allowed from release/*"
                  exit 1
                  ;;
              esac

              test -n "${CHANGE_NUMBER}" || { echo "change_number is required for prod"; exit 1; }

              case "${CHANGE_NUMBER}" in
                CHG-*) ;;
                *)
                  echo "change_number must start with CHG- for prod"
                  exit 1
                  ;;
              esac

              case "${IMAGE_TAG}" in
                main|"")
                  echo "prod deployments must use a fixed image tag, not main"
                  exit 1
                  ;;
              esac
              ;;
            *)
              echo "unsupported environment: ${TARGET_ENV}"
              exit 1
              ;;
          esac

      - name: Validate deployment secrets
        run: |
          set -eu

          test -n "${VM_HOST}" || { echo "VM_HOST is empty"; exit 1; }
          test -n "${VM_USER}" || { echo "VM_USER is empty"; exit 1; }
          test -n "${VM_SSH_KEY}" || { echo "VM_SSH_KEY is empty"; exit 1; }
          test -n "${VM_PORT}" || { echo "VM_PORT is empty"; exit 1; }
          test -n "${GHCR_USERNAME}" || { echo "GHCR_USERNAME is empty"; exit 1; }
          test -n "${GHCR_TOKEN}" || { echo "GHCR_TOKEN is empty"; exit 1; }

      - name: Prepare environment mapping
        env:
          TARGET_ENV: ${{ github.event.inputs.environment }}
          IMAGE_TAG: ${{ github.event.inputs.image_tag }}
        run: |
          set -eu

          echo "TARGET_ENV=${TARGET_ENV}" >> "${GITHUB_ENV}"
          echo "VALUES_FILE=values-${TARGET_ENV}.yaml" >> "${GITHUB_ENV}"
          echo "RELEASE_NAME=springboot-cicd-demo-${TARGET_ENV}" >> "${GITHUB_ENV}"
          echo "IMAGE=ghcr.io/${{ github.repository_owner }}/springboot-cicd-demo:${IMAGE_TAG}" >> "${GITHUB_ENV}"

      - name: Summarize deployment plan
        run: |
          {
            echo "### K8s Deployment Plan"
            echo "- Environment: ${{ github.event.inputs.environment }}"
            echo "- Namespace: ${{ env.TARGET_ENV }}"
            echo "- Source ref: ${{ github.ref_name }}"
            echo "- Image tag: ${{ github.event.inputs.image_tag }}"
            echo "- Image: ${{ env.IMAGE }}"
            echo "- Release: ${{ env.RELEASE_NAME }}"
            echo "- Values file: ${{ env.VALUES_FILE }}"
            if [ "${{ github.event.inputs.environment }}" = "prod" ]; then
              echo "- Change number: ${{ github.event.inputs.change_number }}"
            fi
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Prepare SSH authentication
        run: |
          set -eu

          KEY_FILE="${RUNNER_TEMP}/deploy_key"
          ASKPASS_FILE="${RUNNER_TEMP}/ssh_askpass.sh"
          PUBKEY_FILE="${RUNNER_TEMP}/deploy_key.pub"

          printf '%s\n' "${VM_SSH_KEY}" > "${KEY_FILE}"
          chmod 600 "${KEY_FILE}"

          cat > "${ASKPASS_FILE}" <<EOF
#!/usr/bin/env bash
printf '%s\n' '${VM_SSH_PASSPHRASE}'
EOF
          chmod 700 "${ASKPASS_FILE}"
          echo "SSH_KEY_FILE=${KEY_FILE}" >> "${GITHUB_ENV}"
          echo "SSH_ASKPASS_FILE=${ASKPASS_FILE}" >> "${GITHUB_ENV}"

          ssh-keygen -y -P "${VM_SSH_PASSPHRASE}" -f "${KEY_FILE}" > "${PUBKEY_FILE}"
          ssh-keygen -lf "${PUBKEY_FILE}"

      - name: Verify SSH access to k3s host
        run: |
          set -eu

          DISPLAY=/tmp/ssh-askpass SSH_ASKPASS="${SSH_ASKPASS_FILE}" SSH_ASKPASS_REQUIRE=force setsid -w \
          ssh -i "${SSH_KEY_FILE}" \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              -o ConnectTimeout=20 \
              -o BatchMode=no \
              -p "${VM_PORT}" \
              "${VM_USER}@${VM_HOST}" \
              'echo ssh-preflight-ok && whoami && hostname'

      - name: Package Helm chart
        run: |
          set -eu

          tar -C "${GITHUB_WORKSPACE}" -czf "${RUNNER_TEMP}/springboot-cicd-demo-chart.tgz" helm/springboot-cicd-demo

      - name: Upload Helm chart to k3s host
        run: |
          set -eu

          DISPLAY=/tmp/ssh-askpass SSH_ASKPASS="${SSH_ASKPASS_FILE}" SSH_ASKPASS_REQUIRE=force setsid -w \
          scp -i "${SSH_KEY_FILE}" \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              -o ConnectTimeout=20 \
              -o BatchMode=no \
              -P "${VM_PORT}" \
              "${RUNNER_TEMP}/springboot-cicd-demo-chart.tgz" \
              "${VM_USER}@${VM_HOST}:/tmp/springboot-cicd-demo-chart.tgz"

      - name: Deploy selected GHCR image to k3s
        run: |
          set -eu

          DISPLAY=/tmp/ssh-askpass SSH_ASKPASS="${SSH_ASKPASS_FILE}" SSH_ASKPASS_REQUIRE=force setsid -w \
          ssh -i "${SSH_KEY_FILE}" \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              -o ConnectTimeout=20 \
              -o BatchMode=no \
              -p "${VM_PORT}" \
              "${VM_USER}@${VM_HOST}" <<EOF
          set -eu

          APP_DIR="/opt/springboot-cicd-demo-k8s"
          TARGET_ENV="${TARGET_ENV}"
          VALUES_FILE="${VALUES_FILE}"
          RELEASE_NAME="${RELEASE_NAME}"
          IMAGE_TAG="${{ github.event.inputs.image_tag }}"
          GHCR_USERNAME="${GHCR_USERNAME}"
          GHCR_TOKEN="${GHCR_TOKEN}"

          mkdir -p "\${APP_DIR}"
          rm -rf "\${APP_DIR}/helm"
          tar -xzf /tmp/springboot-cicd-demo-chart.tgz -C "\${APP_DIR}"

          kubectl get namespace "\${TARGET_ENV}" >/dev/null 2>&1 || kubectl create namespace "\${TARGET_ENV}"

          kubectl create secret docker-registry ghcr-creds \
            --namespace "\${TARGET_ENV}" \
            --docker-server=ghcr.io \
            --docker-username="\${GHCR_USERNAME}" \
            --docker-password="\${GHCR_TOKEN}" \
            --docker-email=ci@example.com \
            --dry-run=client -o yaml | kubectl apply -f -

          helm upgrade --install "\${RELEASE_NAME}" "\${APP_DIR}/helm/springboot-cicd-demo" \
            -n "\${TARGET_ENV}" \
            -f "\${APP_DIR}/helm/springboot-cicd-demo/\${VALUES_FILE}" \
            --set image.tag="\${IMAGE_TAG}"

          kubectl rollout status deployment/"\${RELEASE_NAME}" -n "\${TARGET_ENV}" --timeout=180s
          kubectl get deploy,pods,svc -n "\${TARGET_ENV}"
EOF
