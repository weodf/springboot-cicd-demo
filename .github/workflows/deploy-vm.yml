name: Deploy To VM

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options:
          - dev
          - sit
          - uat
          - prod
      image_tag:
        description: Image tag to deploy
        required: true
        default: main
      change_number:
        description: Change number for production deployments
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: deploy-vm-${{ github.event.inputs.environment }}
  cancel-in-progress: true

jobs:
  deploy:
    environment: ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    env:
      VM_HOST: ${{ secrets.VM_HOST }}
      VM_USER: ${{ secrets.VM_USER }}
      VM_SSH_KEY: ${{ secrets.VM_SSH_KEY }}
      VM_SSH_PASSPHRASE: ${{ secrets.VM_SSH_PASSPHRASE }}
      VM_PORT: ${{ secrets.VM_PORT }}
      GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}

    steps:
      - name: Validate deployment request
        env:
          TARGET_ENV: ${{ github.event.inputs.environment }}
          IMAGE_TAG: ${{ github.event.inputs.image_tag }}
          CHANGE_NUMBER: ${{ github.event.inputs.change_number }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -eu

          test -n "${TARGET_ENV}" || { echo "environment is required"; exit 1; }
          test -n "${IMAGE_TAG}" || { echo "image_tag is required"; exit 1; }

          case "${TARGET_ENV}" in
            dev)
              case "${REF_NAME}" in
                feature/*|main) ;;
                *)
                  echo "dev deployments are only allowed from main or feature/*"
                  exit 1
                  ;;
              esac
              ;;
            sit|uat)
              case "${REF_NAME}" in
                main|master|release/*) ;;
                *)
                  echo "${TARGET_ENV} deployments are only allowed from main, master, or release/*"
                  exit 1
                  ;;
              esac
              ;;
            prod)
              case "${REF_NAME}" in
                release/*) ;;
                *)
                  echo "prod deployments are only allowed from release/*"
                  exit 1
                  ;;
              esac

              test -n "${CHANGE_NUMBER}" || { echo "change_number is required for prod"; exit 1; }

              case "${IMAGE_TAG}" in
                main|"")
                  echo "prod deployments must use a fixed image tag, not main"
                  exit 1
                  ;;
              esac
              ;;
            *)
              echo "unsupported environment: ${TARGET_ENV}"
              exit 1
              ;;
          esac

      - name: Validate deployment secrets
        run: |
          set -eu

          test -n "${VM_HOST}" || { echo "VM_HOST is empty"; exit 1; }
          test -n "${VM_USER}" || { echo "VM_USER is empty"; exit 1; }
          test -n "${VM_SSH_KEY}" || { echo "VM_SSH_KEY is empty"; exit 1; }
          test -n "${GHCR_USERNAME}" || { echo "GHCR_USERNAME is empty"; exit 1; }
          test -n "${GHCR_TOKEN}" || { echo "GHCR_TOKEN is empty"; exit 1; }

      - name: Prepare environment mapping
        env:
          TARGET_ENV: ${{ github.event.inputs.environment }}
          IMAGE_TAG: ${{ github.event.inputs.image_tag }}
        run: |
          set -eu

          case "${TARGET_ENV}" in
            dev)
              APP_NAME="springboot-cicd-demo-dev"
              APP_PORT="8081"
              ;;
            sit)
              APP_NAME="springboot-cicd-demo-sit"
              APP_PORT="8082"
              ;;
            uat)
              APP_NAME="springboot-cicd-demo-uat"
              APP_PORT="8083"
              ;;
            prod)
              APP_NAME="springboot-cicd-demo-prod"
              APP_PORT="8080"
              ;;
          esac

          echo "TARGET_ENV=${TARGET_ENV}" >> "${GITHUB_ENV}"
          echo "APP_NAME=${APP_NAME}" >> "${GITHUB_ENV}"
          echo "APP_PORT=${APP_PORT}" >> "${GITHUB_ENV}"
          echo "IMAGE=ghcr.io/${{ github.repository_owner }}/springboot-cicd-demo:${IMAGE_TAG}" >> "${GITHUB_ENV}"

      - name: Summarize deployment plan
        run: |
          {
            echo "### Deployment Plan"
            echo "- Environment: ${{ github.event.inputs.environment }}"
            echo "- Source ref: ${{ github.ref_name }}"
            echo "- Image tag: ${{ github.event.inputs.image_tag }}"
            echo "- Image: ${{ env.IMAGE }}"
            echo "- Container: ${{ env.APP_NAME }}"
            echo "- Port: ${{ env.APP_PORT }}"
            if [ "${{ github.event.inputs.environment }}" = "prod" ]; then
              echo "- Change number: ${{ github.event.inputs.change_number }}"
            fi
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Deploy selected GHCR image to VM
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: "${{ secrets.VM_HOST }}"
          username: "${{ secrets.VM_USER }}"
          key: "${{ secrets.VM_SSH_KEY }}"
          passphrase: "${{ secrets.VM_SSH_PASSPHRASE }}"
          port: "${{ secrets.VM_PORT }}"
          debug: true
          script: |
            set -eu

            APP_DIR="/opt/springboot-cicd-demo"
            APP_NAME="${{ env.APP_NAME }}"
            APP_PORT="${{ env.APP_PORT }}"
            IMAGE="${{ env.IMAGE }}"
            PREVIOUS_IMAGE=""

            mkdir -p "${APP_DIR}"

            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin

            if docker ps -a --format '{{.Names}}' | grep -Fx "${APP_NAME}" >/dev/null; then
              PREVIOUS_IMAGE="$(docker inspect -f '{{.Config.Image}}' "${APP_NAME}")"
              echo "Found existing container ${APP_NAME} using ${PREVIOUS_IMAGE}"
            else
              echo "No existing container found for ${APP_NAME}"
            fi

            docker pull "${IMAGE}"

            docker rm -f "${APP_NAME}" || true

            docker run -d \
              --name "${APP_NAME}" \
              --restart unless-stopped \
              -p "${APP_PORT}:8080" \
              "${IMAGE}"

            for i in $(seq 1 12); do
              if curl -fsS "http://127.0.0.1:${APP_PORT}/actuator/health" | grep '"status":"UP"' >/dev/null; then
                echo "Application is healthy."
                exit 0
              fi
              sleep 5
            done

            echo "Health check failed."
            docker logs "${APP_NAME}" || true

            if [ -n "${PREVIOUS_IMAGE}" ]; then
              echo "Rolling back to ${PREVIOUS_IMAGE}"
              docker rm -f "${APP_NAME}" || true
              docker run -d \
                --name "${APP_NAME}" \
                --restart unless-stopped \
                -p "${APP_PORT}:8080" \
                "${PREVIOUS_IMAGE}"

              for i in $(seq 1 12); do
                if curl -fsS "http://127.0.0.1:${APP_PORT}/actuator/health" | grep '"status":"UP"' >/dev/null; then
                  echo "Rollback succeeded."
                  exit 1
                fi
                sleep 5
              done

              echo "Rollback failed."
              docker logs "${APP_NAME}" || true
            fi

            exit 1
