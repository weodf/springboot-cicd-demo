name: Deploy To VM

on:
  workflow_run:
    workflows:
      - CD
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-vm-main
  cancel-in-progress: true

jobs:
  deploy:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    env:
      VM_HOST: ${{ secrets.VM_HOST }}
      VM_USER: ${{ secrets.VM_USER }}
      VM_SSH_KEY: ${{ secrets.VM_SSH_KEY }}
      VM_PORT: ${{ secrets.VM_PORT }}
      GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}

    steps:
      - name: Validate deployment secrets
        run: |
          set -eu

          test -n "${VM_HOST}" || { echo "VM_HOST is empty"; exit 1; }
          test -n "${VM_USER}" || { echo "VM_USER is empty"; exit 1; }
          test -n "${VM_SSH_KEY}" || { echo "VM_SSH_KEY is empty"; exit 1; }
          test -n "${GHCR_USERNAME}" || { echo "GHCR_USERNAME is empty"; exit 1; }
          test -n "${GHCR_TOKEN}" || { echo "GHCR_TOKEN is empty"; exit 1; }

      - name: Deploy latest GHCR image to VM
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: "${{ secrets.VM_HOST }}"
          username: "${{ secrets.VM_USER }}"
          key: "${{ secrets.VM_SSH_KEY }}"
          port: "${{ secrets.VM_PORT }}"
          debug: true
          script: |
            set -eu

            APP_NAME="springboot-cicd-demo"
            IMAGE="ghcr.io/${{ github.repository_owner }}/springboot-cicd-demo:main"
            APP_DIR="/opt/springboot-cicd-demo"

            mkdir -p "${APP_DIR}"

            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin
            docker pull "${IMAGE}"

            docker rm -f "${APP_NAME}" || true

            docker run -d \
              --name "${APP_NAME}" \
              --restart unless-stopped \
              -p 8080:8080 \
              "${IMAGE}"

            for i in $(seq 1 12); do
              if curl -fsS http://127.0.0.1:8080/actuator/health | grep '"status":"UP"' >/dev/null; then
                echo "Application is healthy."
                exit 0
              fi
              sleep 5
            done

            echo "Health check failed."
            docker logs "${APP_NAME}" || true
            exit 1
